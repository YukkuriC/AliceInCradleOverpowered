- name: MeleeRangeRatio
  type: float
  default: 1f
  category: Combat
  descrip: Melee attack horizontal ranges will be multiplied by this value
- name: WaterShardShield
  type: bool
  default: true
  category: Combat
  descrip: Auto supply water shards during combat
- name: WaterShardExplosive
  type: bool
  default: true
  category: Combat
  descrip: Water shards explode like fireballs on hit
- name: MorePlugins
  type: bool
  default: true
  category: Combat/Plugin
  descrip: Force-added more slots to equip more plugins
- name: NoConsumeFood
  type: bool
  default: true
  category: Item
  descrip: Food won't be consumed on use
- name: PermanentFoodBuff
  type: bool
  default: true
  category: Item
  descrip: Food hunger bar won't decrease
- name: PermanentThrowable
  type: bool
  default: true
  category: Item
  descrip: Throwables won't be consumed on use
- name: MaxStackMult
  type: int
  default: 10
  category: Item
  descrip: Multiplier for all item max stack sizes in inventory
- name: MaxTreasureRewards
  type: int
  default: 999
  category: Item/Reel
  descrip: Upper limit for treasure chest reward count (original game limit is 99)
- name: SortedReelContent
  type: bool
  default: true
  category: Item/Reel
  descrip: Force-sort reel content by effect type + intensity (weak -> strong)
- name: AutoBestReel
  type: bool
  default: true
  category: Item/Reel
  descrip: Auto-select the strongest effect on bonus reel stop (excludes lucky bag/item reels)
- name: AutoBestReel_Lucky
  type: CfgAutoLuckyBag
  default: CfgAutoLuckyBag.Mult
  category: Item/Reel
  descrip: Auto-select the best effect for lucky bag reels
- name: IncReelsFirst
  type: bool
  default: true
  category: Item/Reel
  descrip: Move quantity-increase reels to the front of the list (applies on load and when adding new reels)
- name: NoMosaic
  type: bool
  default: true
  category: Display
  descrip: Disable dynamic mosaic
- name: SuppressStartupErrorLogHint
  type: bool
  default: true
  category: Display
  descrip: Disable error log detection window on startup
- name: EnableHarmonyLogs
  type: bool
  default: false
  category: Display
  descrip: Enable Harmony file log output to game root directory
